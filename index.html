<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NedBot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    h1 { font-size: 4rem; color: #53fc18; letter-spacing: 2px; }
    p { font-size: 1.2rem; color: #aaa; margin-top: 1rem; max-width: 560px; }
    .badge {
      margin-top: 2rem;
      display: inline-block;
      background: #53fc18;
      color: #0d0d0d;
      font-weight: bold;
      padding: 0.6rem 1.4rem;
      border-radius: 4px;
      text-decoration: none;
      font-size: 1rem;
    }
    .badge:hover { background: #3fd410; }
    footer { margin-top: 4rem; color: #444; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>NedBot</h1>
  <p>The horse racing bet bot for Kick. Place bets, track stats, and watch the chaos unfold live.</p>
  <a class="badge" href="https://kick.com" target="_blank">Watch Live on Kick</a>
  <footer>nedbot.site &mdash; more coming soon</footer>
</body>
</html>
